<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">EVERYDAY SHINE</div>
</header>

<section class="section">
  <div class="form-box">
    <h2>Request Appointment</h2>

    <form>
      <div class="form-row">
        <input type="text" placeholder="Full Name" required>
        <input type="tel" placeholder="Phone Number" required>
      </div>

      <input type="email" placeholder="Email Address" required>

      <div class="form-row">
        <select required>
          <option>Select Service</option>
          <option>Maintenance Detail</option>
          <option>Full Detail</option>
          <option>Heavy Reset</option>
        </select>

        <select required>
          <option>Vehicle Condition</option>
          <option>Light</option>
          <option>Moderate</option>
          <option>Heavy</option>
          <option>Severe</option>
        </select>
      </div>

      <input type="date" required>

      <textarea placeholder="Vehicle condition, stains, pet hair, etc."></textarea>

      <button class="btn primary">Submit Request</button>
    </form>

    <p class="disclaimer">
      Non-refundable deposit required. Pricing subject to condition. Final price confirmed after inspection.
    </p>
  </div>
</section>

<footer class="footer">© Everyday Shine Detailing</footer>

</body>
</html>
