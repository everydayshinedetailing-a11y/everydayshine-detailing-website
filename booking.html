<!DOCTYPE html>
<html>
<head>
  <title>Book Appointment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">EVERYDAY SHINE</div>
</header>

<section class="section">
  <div class="form-box">
    <h2>Book Appointment</h2>

    <form name="booking" method="POST">
      <input type="text" name="name" placeholder="Full Name" required>
      <input type="tel" name="phone" placeholder="Phone Number" required>
      <input type="email" name="email" placeholder="Email Address" required>

      <select name="service" required>
        <option value="">Select Service</option>
        <option>Maintenance Detail</option>
        <option>Full Detail</option>
        <option>Heavy Reset</option>
      </select>

      <select name="condition" required>
        <option value="">Vehicle Condition</option>
        <option>Light</option>
        <option>Moderate</option>
        <option>Heavy</option>
        <option>Severe</option>
      </select>

      <input type="date" name="date" required>

      <textarea name="notes" placeholder="Vehicle details, stains, pet hair, etc."></textarea>

      <button type="submit">Submit Request</button>
    </form>

    <p style="font-size:12px; color:#aaa; margin-top:10px;">
      A non-refundable deposit is required to secure your appointment.
    </p>
  </div>
</section>

<div class="footer">
  <p>© Everyday Shine Detailing</p>
</div>

</body>
</html>
